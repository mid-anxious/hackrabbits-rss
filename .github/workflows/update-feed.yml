name: Update RSS Feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper (filtered)
        run: python feed.py --filter complete --output feed.xml
      - name: Run scraper (all)
        run: python feed.py --filter "" --output feed-all.xml
      - name: Commit feeds if changed
        run: |
          git config user.name "hackrabbits-rss-bot"
          git config user.email "bot@hackrabbits-rss"
          git add feed.xml feed-all.xml
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "Update feeds [skip ci]"
            git pull --rebase origin main
            git push
          }
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
